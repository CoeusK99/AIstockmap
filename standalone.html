<title>台灣科技股產業地圖</title>
<style>
  /* ---------- 主題色票(淺色為預設,深色跟隨系統)---------- */
  :root {
    color-scheme: light;
    --surface-1: #fcfcfb;      /* 圖表底 */
    --plane: #f9f9f7;          /* 頁面底 */
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --grid: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11, 11, 11, 0.10);
    /* 產業別(固定順序的類別色) */
    --s-ic: #2a78d6;       /* 藍  IC 設計 */
    --s-fab: #008300;      /* 綠  晶圓製造 */
    --s-mem: #e87ba4;      /* 洋紅 記憶體 */
    --s-osat: #eda100;     /* 黃  封測 */
    --s-equip: #1baf7a;    /* 青  設備材料 */
    --s-comp: #eb6834;     /* 橘  零組件 */
    --s-ems: #4a3aa7;      /* 紫  組裝代工 */
    --s-brand: #e34948;    /* 紅  品牌網通 */
    --s-abroad: #898781;   /* 灰  海外(中性,不占類別色) */
    /* 台股慣例:紅漲綠跌 */
    --quote-up: #d03b3b;
    --quote-down: #006300;
    --panel-bg: #ffffff;
    --chip-bg: #f0efec;
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --surface-1: #1a1a19;
      --plane: #0d0d0d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --grid: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255, 255, 255, 0.10);
      --s-ic: #3987e5;
      --s-fab: #008300;
      --s-mem: #d55181;
      --s-osat: #c98500;
      --s-equip: #199e70;
      --s-comp: #d95926;
      --s-ems: #9085e9;
      --s-brand: #e66767;
      --s-abroad: #898781;
      --quote-up: #e66767;
      --quote-down: #0ca30c;
      --panel-bg: #212120;
      --chip-bg: #2c2c2a;
    }
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", "Noto Sans TC", sans-serif;
    background: var(--plane);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---------- 頂欄 ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel-bg);
    flex-wrap: wrap;
  }
  header h1 { font-size: 16px; margin: 0; white-space: nowrap; }
  header .sub { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  #search {
    flex: 0 1 220px;
    min-width: 140px;
    padding: 6px 10px;
    font-size: 13px;
    border: 1px solid var(--baseline);
    border-radius: 8px;
    background: var(--surface-1);
    color: var(--text-primary);
  }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .chip {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--baseline);
    background: var(--chip-bg);
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
  }
  .chip.on { background: var(--text-primary); color: var(--plane); border-color: var(--text-primary); }
  .edge-toggles { display: flex; gap: 10px; align-items: center; font-size: 12px; color: var(--text-secondary); }
  .edge-toggles label { display: flex; gap: 4px; align-items: center; cursor: pointer; white-space: nowrap; }
  #layout-toggle {
    display: flex; border: 1px solid var(--baseline); border-radius: 8px; overflow: hidden;
  }
  #layout-toggle button {
    border: none; background: var(--surface-1); color: var(--text-secondary);
    font-size: 12px; padding: 6px 12px; cursor: pointer; white-space: nowrap;
  }
  #layout-toggle button + button { border-left: 1px solid var(--baseline); }
  #layout-toggle button.on { background: var(--text-primary); color: var(--plane); }

  /* ---------- 主區 ---------- */
  #theme-bar {
    display: flex; gap: 8px; align-items: center;
    padding: 5px 16px; border-bottom: 1px solid var(--baseline);
    overflow-x: auto; flex-shrink: 0;
  }
  #theme-bar .chips { flex-wrap: nowrap; }
  #theme-bar .chips-label {
    font-size: 11px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0;
  }
  .chip.theme { border-style: dashed; white-space: nowrap; }
  .chip.theme.on { border-style: solid; }
  main { flex: 1; display: flex; min-height: 0; position: relative; }

  /* 左側:產業圖例 */
  aside.legend {
    width: 168px;
    flex: none;
    padding: 12px;
    border-right: 1px solid var(--border);
    background: var(--panel-bg);
    overflow-y: auto;
    font-size: 13px;
  }
  aside.legend h2 { font-size: 12px; color: var(--text-muted); margin: 0 0 8px; font-weight: 600; }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 6px; border-radius: 6px; cursor: pointer; user-select: none;
    color: var(--text-secondary);
  }
  .legend-item:hover { background: var(--chip-bg); }
  .legend-item.off { opacity: 0.35; }
  .legend-item .dot { width: 12px; height: 12px; border-radius: 50%; flex: none; border: 1px solid var(--border); }
  .legend-item .n { margin-left: auto; color: var(--text-muted); font-size: 11px; }
  .legend-hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  .edge-legend { margin-top: 16px; font-size: 12px; color: var(--text-secondary); }
  .edge-legend .row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .edge-legend svg { flex: none; }

  /* 圖區 */
  #graph { flex: 1; min-width: 0; background: var(--surface-1); cursor: grab; }
  #graph:active { cursor: grabbing; }
  #graph text { pointer-events: none; }

  /* 右側:個股資訊 */
  aside.panel {
    width: 300px;
    flex: none;
    border-left: 1px solid var(--border);
    background: var(--panel-bg);
    overflow-y: auto;
    padding: 16px;
    display: none;
  }
  aside.panel.open { display: block; }
  .panel-close { float: right; border: none; background: none; font-size: 18px; cursor: pointer; color: var(--text-muted); }
  .panel h2 { margin: 0 0 2px; font-size: 18px; }
  .panel .ticker { color: var(--text-muted); font-size: 13px; }
  .panel .sector-chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-secondary);
    border: 1px solid var(--baseline); border-radius: 999px;
    padding: 2px 10px; margin: 8px 0;
  }
  .panel .sector-chip .dot { width: 10px; height: 10px; border-radius: 50%; }
  .panel .theme-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .panel .theme-tags span {
    font-size: 10.5px; color: var(--text-secondary); background: var(--chip-bg);
    border: 1px dashed var(--baseline); border-radius: 999px; padding: 2px 8px;
  }
  .panel .eco-card {
    margin: 10px 0 6px; padding: 9px 11px; border-radius: 10px;
    background: var(--chip-bg); font-size: 12px; line-height: 1.55;
  }
  .panel .eco-card .eco-line { display: flex; gap: 8px; margin-bottom: 3px; }
  .panel .eco-card .eco-line .k {
    flex-shrink: 0; color: var(--text-muted); min-width: 62px; font-size: 11px; padding-top: 1px;
  }
  .panel .eco-card .eco-meta { display: flex; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
  .panel .eco-card .meta {
    font-size: 10.5px; border-radius: 999px; padding: 2px 9px;
    border: 1px solid var(--baseline); color: var(--text-secondary);
  }
  .panel .eco-card .meta.expo-hi { border-color: var(--quote-up); color: var(--quote-up); font-weight: 600; }
  .panel .eco-card .meta.expo-mid { font-weight: 600; }
  .panel .eco-card .meta.yes { border-color: var(--quote-up); color: var(--quote-up); }
  .panel .eco-membership { display: flex; gap: 5px; flex-wrap: wrap; margin: 4px 0 10px; }
  .panel .eco-badge {
    font: inherit; font-size: 10.5px; cursor: pointer;
    border: 1px solid var(--baseline); border-radius: 999px; padding: 3px 9px;
    background: transparent; color: var(--text-muted);
  }
  .panel .eco-badge.member { color: var(--text-primary); border-style: solid; background: var(--chip-bg); }
  .panel .eco-badge:not(.member) { border-style: dashed; opacity: 0.65; }
  .panel .eco-badge.on { background: var(--text-primary); color: var(--plane); border-color: var(--text-primary); opacity: 1; }
  .panel .quote { margin: 6px 0 10px; font-size: 14px; }
  .panel .quote .price { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .panel .quote .chg { margin-left: 8px; font-variant-numeric: tabular-nums; }
  .panel .quote .chg.up { color: var(--quote-up); }
  .panel .quote .chg.down { color: var(--quote-down); }
  .panel .quote .asof { font-size: 11px; color: var(--text-muted); }
  .panel .desc { font-size: 13px; line-height: 1.7; color: var(--text-secondary); }
  .panel h3 { font-size: 12px; color: var(--text-muted); margin: 16px 0 6px; font-weight: 600; }
  .rel-item {
    display: block; width: 100%; text-align: left;
    border: 1px solid var(--border); background: var(--surface-1);
    border-radius: 8px; padding: 7px 10px; margin-bottom: 6px;
    cursor: pointer; font-size: 13px; color: var(--text-primary);
  }
  .rel-item:hover { border-color: var(--baseline); }
  .rel-item .who { font-weight: 600; }
  .rel-item .what { display: block; font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  a.rel-item { text-decoration: none; box-sizing: border-box; }
  .rel-item.static { cursor: default; }
  .rel-item.static:hover { border-color: var(--border); }
  .doc-type {
    display: inline-block; font-size: 11px; font-weight: 600;
    color: var(--text-secondary); background: var(--chip-bg);
    border-radius: 4px; padding: 1px 6px; margin-right: 6px;
  }
  .fund {
    display: flex; gap: 6px 14px; flex-wrap: wrap;
    font-size: 12.5px; color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface-1); padding: 7px 10px; margin: 8px 0;
    font-variant-numeric: tabular-nums;
  }
  .fund i { font-style: normal; color: var(--text-muted); font-size: 11px; }
  .prod-row {
    position: relative; margin-bottom: 4px; padding: 4px 8px;
    border-radius: 6px; overflow: hidden; font-size: 12.5px;
    display: flex; justify-content: space-between; gap: 8px;
    background: var(--chip-bg);
  }
  .prod-bar {
    position: absolute; inset: 0 auto 0 0;
    opacity: 0.18; border-radius: 6px;
  }
  .prod-row .prod-name { position: relative; color: var(--text-primary); }
  .prod-row .prod-share { position: relative; color: var(--text-secondary); font-variant-numeric: tabular-nums; font-weight: 600; }
  .prod-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
  .prod {
    font-size: 12px; color: var(--text-secondary);
    background: var(--chip-bg); border-radius: 6px; padding: 3px 8px;
    line-height: 1.5;
  }
  .rel-item.rumor { border-left: 3px solid var(--s-osat); }
  .rel-item.rumor .what { white-space: normal; }
  .doc-hint { font-size: 12px; color: var(--text-muted); line-height: 1.7; }
  .doc-hint code { background: var(--chip-bg); border-radius: 4px; padding: 1px 4px; font-size: 11px; }
  .ext-links { display: flex; gap: 6px; flex-wrap: wrap; }
  .ext-links a {
    font-size: 12px; color: var(--text-secondary); text-decoration: none;
    border: 1px solid var(--baseline); border-radius: 999px; padding: 3px 10px;
  }
  .ext-links a:hover { color: var(--text-primary); border-color: var(--text-muted); }

  /* 浮動提示 */
  #tooltip {
    position: fixed; pointer-events: none; z-index: 10;
    background: var(--panel-bg); color: var(--text-primary);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; font-size: 12px; line-height: 1.5;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    max-width: 260px; display: none;
  }
  #tooltip .t-name { font-weight: 700; font-size: 13px; }
  #tooltip .t-sub { color: var(--text-muted); }

  /* 右下角控制 */
  .zoom-ctrl {
    position: absolute; right: 12px; bottom: 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .panel.open ~ .zoom-ctrl { right: 312px; }
  .zoom-ctrl button {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--baseline); background: var(--panel-bg);
    color: var(--text-primary); font-size: 15px; cursor: pointer;
  }

  footer {
    padding: 5px 16px; font-size: 11px; color: var(--text-muted);
    border-top: 1px solid var(--border); background: var(--panel-bg);
    display: flex; gap: 12px; flex-wrap: wrap;
  }

  @media (max-width: 800px) {
    aside.legend { display: none; }
    aside.panel { position: absolute; right: 0; top: 0; bottom: 0; box-shadow: -8px 0 24px rgba(0,0,0,0.2); }
    .panel.open ~ .zoom-ctrl { right: 12px; }
  }

:root[data-theme="dark"] {
      color-scheme: dark;
      --surface-1: #1a1a19;
      --plane: #0d0d0d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --grid: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255, 255, 255, 0.10);
      --s-ic: #3987e5;
      --s-fab: #008300;
      --s-mem: #d55181;
      --s-osat: #c98500;
      --s-equip: #199e70;
      --s-comp: #d95926;
      --s-ems: #9085e9;
      --s-brand: #e66767;
      --s-abroad: #898781;
      --quote-up: #e66767;
      --quote-down: #0ca30c;
      --panel-bg: #212120;
      --chip-bg: #2c2c2a;
}
</style>

  <header>
    <div>
      <h1>台灣科技股產業地圖</h1>
      <div class="sub">供應鏈 × 集團 × 競爭關係</div>
    </div>
    <input id="search" list="stock-list" placeholder="搜尋代號或名稱,如 2330">
    <datalist id="stock-list"></datalist>
    <div id="layout-toggle">
      <button data-mode="chain" class="on">產業鏈</button>
      <button data-mode="net">自由網絡</button>
    </div>
    <div class="chips" id="tag-chips"></div>
    <div class="edge-toggles" id="edge-toggles">
      <label><input type="checkbox" data-type="supply" checked> 供應鏈</label>
      <label><input type="checkbox" data-type="group" checked> 集團</label>
      <label><input type="checkbox" data-type="rival" checked> 競爭</label>
      <label title="點選個股時,沿供應線遞迴點亮整條上下游產業鏈"><input type="checkbox" id="chain-mode"> 全鏈追蹤</label>
    </div>
  </header>

  <div id="theme-bar">
    <span class="chips-label">AI 主題</span>
    <div class="chips" id="theme-chips"></div>
  </div>

  <main>
    <aside class="legend">
      <h2>產業別(點擊篩選)</h2>
      <div id="sector-legend"></div>
      <div class="legend-hint">再點一下取消;全部熄滅時視同全選。</div>
      <div class="edge-legend">
        <h2>關係線</h2>
        <div class="row"><svg width="28" height="10"><line x1="0" y1="5" x2="22" y2="5" stroke="var(--s-fab)" stroke-width="1.8"/><path d="M22,5 l-5,-3 v6 z" fill="var(--s-fab)"/></svg>供應(→ 客戶)</div>
        <div class="legend-hint" style="margin:0 0 4px">線色 = 供應方的產業色</div>
        <div class="row"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="currentColor" stroke-width="1.6" stroke-dasharray="5 3"/></svg>集團/持股</div>
        <div class="row"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="currentColor" stroke-width="2" stroke-dasharray="7 2 2 2"/></svg>互相持股 ⇄</div>
        <div class="row"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="currentColor" stroke-width="1.6" stroke-dasharray="1.5 3"/></svg>競爭</div>
        <div class="row"><svg width="28" height="14"><circle cx="14" cy="7" r="4" fill="var(--text-muted)"/><circle cx="14" cy="7" r="6.5" fill="none" stroke="var(--quote-up)" stroke-width="2"/></svg>光環 = 當日漲跌</div>
        <div class="legend-hint" style="margin:0">紅漲綠跌,幅度越大越明顯。</div>
      </div>
    </aside>

    <svg id="graph"></svg>

    <aside class="panel" id="panel"></aside>

    <div class="zoom-ctrl">
      <button id="zoom-in" title="放大">+</button>
      <button id="zoom-out" title="縮小">−</button>
      <button id="zoom-fit" title="重設視角">⌂</button>
    </div>
  </main>

  <footer>
    <span>產業鏈檢視:左 = 上游、右 = 下游;節點大小 ≈ 公司規模;點選個股會亮起它的上下游並顯示流向。</span>
    <span id="quote-status">報價載入中…</span>
    <span>資料為公開資訊之人工整理,僅供研究參考,不構成投資建議。</span>
  </footer>

  <div id="tooltip"></div>

  return __realFetch(url, ...args);
};
</script>
<script>/* 台灣科技股產業地圖 — 產業鏈分層 / 自由網絡 雙模式關係圖 */
/* global d3, MAP_DATA */
(() => {
  const { sectors, nodes, links } = window.MAP_DATA;
  const sectorById = new Map(sectors.map((s) => [s.id, s]));
  const nodeById = new Map(nodes.map((n) => [n.id, n]));

  // 欄內子族群(產業鏈檢視分區 + 摺疊)
  const SUBS = window.MAP_SUBS || {};
  const subOrder = {};
  Object.entries(SUBS).forEach(([sec, groups]) => { subOrder[sec] = Object.keys(groups); });
  const membersBySub = {};
  nodes.forEach((n) => {
    (membersBySub[n.sector] ||= {});
    membersBySub[n.sector][n.sub] = (membersBySub[n.sector][n.sub] || 0) + 1;
  });
  const collapsed = new Set(); // "sector|sub"
  const subKey = (n) => `${n.sector}|${n.sub}`;

  // ---------- 產業鏈階段(左 = 上游,右 = 下游)----------
  const STAGES = [
    { label: "設備・材料",   sectors: ["equip"] },
    { label: "晶圓・記憶體", sectors: ["fab", "mem"] },
    { label: "封裝測試",     sectors: ["osat"] },
    { label: "IC 設計",      sectors: ["ic"] },
    { label: "關鍵零組件",   sectors: ["comp"] },
    { label: "組裝・代工",   sectors: ["ems"] },
    { label: "品牌・網通",   sectors: ["brand"] },
    { label: "海外・終端",   sectors: ["abroad"] },
  ];
  const stageOfSector = new Map();
  STAGES.forEach((s, i) => s.sectors.forEach((id) => stageOfSector.set(id, i)));

  // 同一欄裡兩個產業時的垂直分工(晶圓上半、記憶體下半)
  const Y_BIAS = { fab: 0.38, mem: 0.80 };

  // 自由網絡模式的聚落中心
  const CLUSTER = {
    equip: [0.07, 0.32], fab: [0.20, 0.58], ic: [0.33, 0.25], mem: [0.30, 0.82],
    osat: [0.46, 0.62], comp: [0.58, 0.32], ems: [0.72, 0.62], brand: [0.83, 0.24],
    abroad: [0.90, 0.72],
  };

  const RADIUS = { 1: 22, 2: 14, 3: 10 };
  const r = (n) => RADIUS[n.tier] || 12;
  const HEADER_H = 64; // 分層模式頂部欄位標題保留高度

  // ---------- SVG 骨架 ----------
  const svg = d3.select("#graph");
  const tooltip = document.getElementById("tooltip");
  let width = 0;
  let height = 0;
  let mode = "chain"; // chain 產業鏈 | net 自由網絡

  const defs = svg.append("defs");
  // 每個產業一支同色箭頭,供應線的箭頭跟線色一致
  sectors.forEach((s) => {
    defs
      .append("marker")
      .attr("id", `arrow-${s.id}`)
      .attr("viewBox", "0 -4 8 8")
      .attr("refX", 7)
      .attr("refY", 0)
      .attr("markerWidth", 6.5)
      .attr("markerHeight", 6.5)
      .attr("orient", "auto")
      .append("path")
      .attr("d", "M0,-4 L8,0 L0,4")
      .style("fill", `var(--s-${s.id})`);
  });

  const root = svg.append("g");
  const bgLayer = root.append("g");        // 欄位底色與子族群標題(跟著縮放)
  const linkLayer = root.append("g");
  const nodeLayer = root.append("g");
  const bubbleLayer = root.append("g");    // 摺疊後的子族群氣泡
  const headerLayer = svg.append("g");     // 欄位標題(固定在畫面頂端,不跟縮放)

  const style = document.createElement("style");
  style.textContent = `
    #graph .stage-stripe { fill: var(--chip-bg); opacity: 0.45; }
    #graph .stage-label {
      fill: var(--text-secondary); font-size: 13px; font-weight: 700; text-anchor: middle;
      paint-order: stroke; stroke: var(--surface-1); stroke-width: 4px; stroke-linejoin: round;
    }
    #graph .stage-sub { fill: var(--text-muted); font-size: 10.5px; text-anchor: middle; }
    #graph .stage-arrow-head { fill: var(--baseline); }
    #graph .link-hit { stroke: transparent; stroke-width: 12; fill: none; cursor: pointer; }
    #graph .link { fill: none; stroke-width: 1.5; stroke: var(--baseline); }
    #graph .link.supply { opacity: 0.55; }
    #graph .link.group { stroke-dasharray: 6 3; stroke-width: 1.8; }
    #graph .link.cross { stroke-dasharray: 9 3 2 3; stroke-width: 2; stroke: var(--text-secondary); }
    #graph .link.rival { stroke-dasharray: 1.5 4; }
    #graph g.hl .link { stroke-width: 2.6; opacity: 1; }
    #graph g.hl .link.supply { stroke-dasharray: 7 4; animation: flow 0.5s linear infinite; }
    @keyframes flow { to { stroke-dashoffset: -11; } }
    #graph .node circle { stroke: var(--surface-1); stroke-width: 1.5; cursor: pointer; }
    #graph .node.sel circle { stroke: var(--text-primary); stroke-width: 2.5; }
    #graph .node text {
      fill: var(--text-primary); text-anchor: middle;
      paint-order: stroke; stroke: var(--surface-1); stroke-width: 3px; stroke-linejoin: round;
    }
    #graph .node .tk { fill: var(--text-muted); stroke-width: 2.5px; }
    #graph .faded { opacity: 0.08; }
    #graph .subhidden { display: none; }
    #graph .sub-head { cursor: pointer; }
    #graph .sub-head text {
      font-size: 10px; fill: var(--text-muted);
      paint-order: stroke; stroke: var(--surface-1); stroke-width: 3px;
    }
    #graph .sub-head:hover text { fill: var(--text-primary); }
    #graph .bubble { cursor: pointer; }
    #graph .bubble circle { stroke: var(--surface-1); stroke-width: 2; }
    #graph .bubble .cnt {
      fill: #fff; font-size: 11px; font-weight: 700; text-anchor: middle;
    }
    #graph .bubble .nm {
      fill: var(--text-primary); font-size: 10.5px; text-anchor: middle;
      paint-order: stroke; stroke: var(--surface-1); stroke-width: 3px;
    }
    #graph .link-label {
      display: none; font-size: 9.5px; fill: var(--text-secondary);
      text-anchor: middle; pointer-events: none;
      paint-order: stroke; stroke: var(--surface-1); stroke-width: 3px; stroke-linejoin: round;
    }
    #graph g.hl .link-label { display: block; }
  `;
  document.head.appendChild(style);

  // ---------- 連線(曲線 + 命中範圍)----------
  const simLinks = links.map((l) => ({ ...l }));
  const linkG = linkLayer
    .selectAll("g")
    .data(simLinks)
    .join("g");
  linkG
    .append("path")
    .attr("class", (d) => `link ${d.type}`)
    .style("stroke", (d) => (d.type === "supply" ? `var(--s-${nodeById.get(d.source).sector})` : null))
    .attr("marker-end", (d) => (d.type === "supply" ? `url(#arrow-${nodeById.get(d.source).sector})` : null));
  linkG
    .append("path")
    .attr("class", "link-hit")
    .on("mousemove", (ev, d) => showLinkTip(ev, d))
    .on("mouseleave", hideTip);

  // 選取公司時,關係線中點浮出標籤(供應線=產品、持股線=持股說明)
  linkG
    .append("text")
    .attr("class", "link-label")
    .text((d) => {
      const t = d.label || "";
      // pct = 該產品線約佔供應方營收的比重(data.js SUPPLY_PCT)
      return (t.length > 16 ? t.slice(0, 15) + "…" : t) + (d.pct ? ` ${d.pct}%` : "");
    });

  function linkGeom(d) {
    const sx = d.source.x, sy = d.source.y;
    let tx = d.target.x, ty = d.target.y;
    const dx = tx - sx, dy = ty - sy;
    const len = Math.hypot(dx, dy) || 1;
    if (d.type === "supply") {
      const pad = r(d.target) + 5;
      tx -= (dx / len) * pad;
      ty -= (dy / len) * pad;
    }
    const curve = Math.min(36, len * 0.14);
    const cx = (sx + tx) / 2 - (dy / len) * curve;
    const cy = (sy + ty) / 2 + (dx / len) * curve;
    return { sx, sy, tx, ty, cx, cy };
  }

  function linkPath(d) {
    const g = linkGeom(d);
    return `M${g.sx},${g.sy} Q${g.cx},${g.cy} ${g.tx},${g.ty}`;
  }

  // 二次貝茲曲線 t=0.5 的點(標籤錨點)
  function linkMid(d) {
    const g = linkGeom(d);
    return { x: 0.25 * g.sx + 0.5 * g.cx + 0.25 * g.tx, y: 0.25 * g.sy + 0.5 * g.cy + 0.25 * g.ty };
  }

  // ---------- 節點 ----------
  const nodeSel = nodeLayer
    .selectAll("g")
    .data(nodes)
    .join("g")
    .attr("class", "node")
    .call(
      d3.drag()
        .on("start", (ev, d) => {
          if (!ev.active) sim.alphaTarget(0.25).restart();
          d.fx = d.x; d.fy = d.y;
        })
        .on("drag", (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
        .on("end", (ev) => { if (!ev.active) sim.alphaTarget(0); })
    )
    .on("mousemove", (ev, d) => showNodeTip(ev, d))
    .on("mouseleave", hideTip)
    .on("click", (ev, d) => { ev.stopPropagation(); select(d.id); })
    .on("dblclick", (ev, d) => {
      ev.stopPropagation();
      d.fx = null; d.fy = null;
      sim.alpha(0.3).restart();
    });

  // 行情光環:報價載入後顯示,紅漲綠跌(台股慣例),幅度越大越明顯
  nodeSel
    .append("circle")
    .attr("class", "qring")
    .attr("r", (d) => r(d) + 3.5)
    .style("fill", "none")
    .style("stroke-width", 2.5)
    .style("display", "none");

  nodeSel.append("circle").attr("r", (d) => r(d)).style("fill", (d) => `var(--s-${d.sector})`);
  nodeSel
    .append("text")
    .attr("dy", (d) => r(d) + 13)
    .style("font-size", (d) => ({ 1: "13px", 2: "11.5px", 3: "10.5px" }[d.tier]))
    .style("font-weight", (d) => (d.tier === 1 ? 700 : 500))
    .text((d) => d.name);
  nodeSel
    .filter((d) => d.market !== "foreign")
    .append("text")
    .attr("class", "tk")
    .attr("dy", (d) => r(d) + 24)
    .style("font-size", "9px")
    .text((d) => d.id);

  // ---------- 力導向模擬(依模式配置)----------
  const stageXOf = (sec) => ((stageOfSector.get(sec) ?? 4) + 0.5) / STAGES.length * width;
  const stageX = (n) => stageXOf(n.sector);

  // 產業鏈檢視:每欄依子族群切成垂直帶;摺疊的族群只留一小段
  let bands = {}; // sector -> sub -> { y0, cy, h }
  function computeBands() {
    bands = {};
    const top = HEADER_H + 22;
    const span = Math.max(height - 12 - top, 240);
    STAGES.forEach((stage) => {
      const entries = [];
      stage.sectors.forEach((sec) =>
        (subOrder[sec] || []).forEach((sub) => {
          const count = membersBySub[sec]?.[sub] || 0;
          if (count) entries.push({ sec, sub, count });
        })
      );
      const weight = (e) => (collapsed.has(`${e.sec}|${e.sub}`) ? 1.7 : e.count + 1.1);
      const total = entries.reduce((s, e) => s + weight(e), 0) || 1;
      let y = top;
      entries.forEach((e) => {
        const h = (span * weight(e)) / total;
        (bands[e.sec] ||= {})[e.sub] = { y0: y, cy: y + h / 2 + 5, h };
        y += h;
      });
    });
  }
  const chainY = (n) => bands[n.sector]?.[n.sub]?.cy ?? HEADER_H + 0.5 * (height - HEADER_H);

  // 初始位置先落在各自欄位,收斂快、交錯少
  nodes.forEach((n, i) => {
    n.x = stageX(n) + (Math.sin(i * 7) * 20);
    n.y = HEADER_H + ((i * 53) % 617) / 617 * 600;
  });

  const sim = d3
    .forceSimulation(nodes)
    .force("link", d3.forceLink(simLinks).id((d) => d.id))
    .force("charge", d3.forceManyBody())
    .force("collide", d3.forceCollide().radius((d) => r(d) + 17))
    .force("x", d3.forceX())
    .force("y", d3.forceY());

  function configureForces() {
    if (mode === "chain") {
      computeBands();
      sim.force("link").distance(120).strength(0.02);
      sim.force("charge").strength(-110);
      sim.force("x").x(stageX).strength(0.95);
      sim.force("y").y(chainY).strength(0.14);
    } else {
      sim.force("link").distance((l) => (l.type === "group" ? 60 : 90)).strength(0.25);
      sim.force("charge").strength(-320);
      sim.force("x").x((d) => (CLUSTER[d.sector] ? CLUSTER[d.sector][0] * width : width / 2)).strength(0.14);
      sim.force("y").y((d) => (CLUSTER[d.sector] ? CLUSTER[d.sector][1] * height : height / 2)).strength(0.14);
    }
  }

  sim.on("tick", () => {
    linkG.selectAll("path").attr("d", (d) => linkPath(d));
    linkG
      .select(".link-label")
      .attr("x", (d) => linkMid(d).x)
      .attr("y", (d) => linkMid(d).y - 4);
    nodeSel.attr("transform", (d) => `translate(${d.x},${d.y})`);
  });

  // ---------- 欄位底色(世界座標)+ 欄位標題(螢幕座標,永遠可見)----------
  function drawStages() {
    bgLayer.selectAll("*").remove();
    headerLayer.selectAll("*").remove();
    if (mode !== "chain") return;
    const colW = width / STAGES.length;
    STAGES.forEach((s, i) => {
      if (i % 2 === 1) {
        bgLayer.append("rect")
          .attr("class", "stage-stripe")
          .attr("x", i * colW).attr("y", -height)
          .attr("width", colW).attr("height", height * 3);
      }
      const g = headerLayer.append("g").attr("class", "stage-head").datum(i);
      g.append("text").attr("class", "stage-label").attr("y", 22).text(s.label);
      // 標題底下的產業色短線,把分區跟圖例顏色連起來
      const barW = 14;
      s.sectors.forEach((secId, j) => {
        g.append("rect")
          .attr("x", -(s.sectors.length * (barW + 4) - 4) / 2 + j * (barW + 4))
          .attr("y", 29)
          .attr("width", barW).attr("height", 4).attr("rx", 2)
          .style("fill", `var(--s-${secId})`);
      });
      g.append("text").attr("class", "stage-sub").attr("y", 47)
        .text(i === 0 ? "上游" : i === STAGES.length - 1 ? "下游/需求端" : "");
      if (i < STAGES.length - 1) {
        g.append("path").attr("class", "stage-arrow-head").attr("d", "M0,18 l-6,-3.5 v7 z");
      }
    });

    // 子族群小標題(帶起點,點擊摺疊/展開)
    STAGES.forEach((stage, i) => {
      const entries = [];
      stage.sectors.forEach((sec) =>
        (subOrder[sec] || []).forEach((sub) => {
          if (membersBySub[sec]?.[sub]) entries.push({ sec, sub });
        })
      );
      if (entries.length < 2) return; // 單一族群的欄不需要分區標題
      const x0 = i * colW;
      entries.forEach(({ sec, sub }) => {
        const b = bands[sec]?.[sub];
        if (!b) return;
        const key = `${sec}|${sub}`;
        const isC = collapsed.has(key);
        const g = bgLayer.append("g").attr("class", "sub-head");
        g.append("text")
          .attr("x", x0 + 6)
          .attr("y", b.y0 + 10)
          .text(`${isC ? "▸" : "▾"} ${sub}(${membersBySub[sec][sub]})`);
        g.on("click", (ev) => {
          ev.stopPropagation();
          toggleSub(sec, sub);
        });
      });
    });

    updateHeaders(d3.zoomTransform(svg.node()));
  }

  // ---------- 子族群摺疊 ----------
  function applyCollapse() {
    nodes.forEach((n) => {
      const isC = mode === "chain" && collapsed.has(subKey(n));
      if (isC) {
        const b = bands[n.sector]?.[n.sub];
        n.fx = stageX(n);
        n.fy = b ? b.cy : n.y;
      } else if (n._pinned) {
        n.fx = null;
        n.fy = null;
      }
      n._pinned = isC;
    });
    nodeSel.classed("subhidden", (d) => mode === "chain" && collapsed.has(subKey(d)));
    linkG.classed(
      "subhidden",
      (d) => mode === "chain" && (collapsed.has(subKey(d.source)) || collapsed.has(subKey(d.target)))
    );
    renderBubbles();
  }

  function renderBubbles() {
    const data =
      mode === "chain"
        ? [...collapsed]
            .map((key) => {
              const [sec, sub] = key.split("|");
              const b = bands[sec]?.[sub];
              if (!b) return null;
              return { key, sec, sub, x: stageXOf(sec), y: b.cy, count: membersBySub[sec][sub] };
            })
            .filter(Boolean)
        : [];
    const sel = bubbleLayer.selectAll("g.bubble").data(data, (d) => d.key);
    sel.exit().remove();
    const enter = sel.enter().append("g").attr("class", "bubble");
    enter.append("circle").attr("r", 15);
    enter.append("text").attr("class", "cnt").attr("dy", 4);
    enter.append("text").attr("class", "nm").attr("dy", 30);
    const all = enter.merge(sel);
    all.attr("transform", (d) => `translate(${d.x},${d.y})`);
    all.select("circle").style("fill", (d) => `var(--s-${d.sec})`);
    all.select(".cnt").text((d) => d.count);
    all.select(".nm").text((d) => d.sub);
    all.on("click", (ev, d) => {
      ev.stopPropagation();
      toggleSub(d.sec, d.sub);
    });
  }

  function toggleSub(sec, sub) {
    const key = `${sec}|${sub}`;
    if (collapsed.has(key)) collapsed.delete(key);
    else collapsed.add(key);
    configureForces();
    applyCollapse();
    drawStages();
    sim.alpha(0.5).restart();
    applyFilters();
  }

  // 依目前縮放,把螢幕座標的標題對齊各欄位中心
  function updateHeaders(t) {
    if (mode !== "chain") return;
    const colW = width / STAGES.length;
    headerLayer.selectAll("g.stage-head").each(function (i) {
      const cx = t.applyX((i + 0.5) * colW);
      const g = d3.select(this);
      g.attr("transform", `translate(${cx},0)`);
      // 欄位間的方向箭頭放在兩個標題中間
      g.select(".stage-arrow-head").attr("transform", `translate(${t.applyX((i + 1) * colW) - cx},0)`);
    });
  }

  function resize() {
    const rect = svg.node().getBoundingClientRect();
    width = rect.width;
    height = rect.height;
    configureForces();
    drawStages();
    applyCollapse();
    sim.alpha(0.5).restart();
  }
  window.addEventListener("resize", resize);
  resize();

  // ---------- 模式切換 ----------
  document.querySelectorAll("#layout-toggle button").forEach((btn) => {
    btn.onclick = () => {
      if (btn.dataset.mode === mode) return;
      mode = btn.dataset.mode;
      document.querySelectorAll("#layout-toggle button").forEach((b) => b.classList.toggle("on", b.dataset.mode === mode));
      nodes.forEach((n) => { n.fx = null; n.fy = null; n._pinned = false; });
      configureForces();
      drawStages();
      applyCollapse();
      sim.alpha(0.9).restart();
      setTimeout(fitView, 1100);
    };
  });

  // ---------- 縮放平移 ----------
  const zoom = d3.zoom().scaleExtent([0.35, 4]).on("zoom", (ev) => {
    root.attr("transform", ev.transform);
    updateHeaders(ev.transform);
  });
  svg.call(zoom).on("dblclick.zoom", null);
  svg.on("click", () => select(null));

  document.getElementById("zoom-in").onclick = () => svg.transition().duration(200).call(zoom.scaleBy, 1.35);
  document.getElementById("zoom-out").onclick = () => svg.transition().duration(200).call(zoom.scaleBy, 1 / 1.35);
  document.getElementById("zoom-fit").onclick = fitView;

  function fitView() {
    const b = nodeLayer.node().getBBox();
    if (!b.width || !b.height) return;
    // 產業鏈模式時,畫面頂端保留給欄位標題
    const topPad = mode === "chain" ? HEADER_H : 12;
    const availH = height - topPad - 12;
    const scale = Math.min(3, Math.min((width * 0.95) / b.width, availH / b.height));
    const tx = width / 2 - scale * (b.x + b.width / 2);
    const ty = topPad + availH / 2 - scale * (b.y + b.height / 2);
    svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }
  setTimeout(fitView, 2200); // 節點多,等佈局大致收斂再取景

  // ---------- 篩選狀態 ----------
  const state = {
    sectors: new Set(),
    tags: new Set(),
    themes: new Set(),
    eco: new Set(), // 生態系篩選(由面板徽章切換)
    edges: new Set(["supply", "group", "cross", "rival"]),
    selected: null,
    chain: false, // 全鏈追蹤:沿供應線遞迴點亮整條上下游
  };

  // AI 供應鏈主題:id → 所屬主題集合
  const THEMES = window.MAP_THEMES || {};
  const themesOf = {};
  Object.entries(THEMES).forEach(([name, ids]) =>
    ids.forEach((id) => (themesOf[id] ||= new Set()).add(name)));

  // ---------- 六大生態系歸屬(由關係圖 + 主題自動推導)----------
  // 錨點的一階供應/集團鄰居 ∪ 對應主題成員。
  const ECO_DEFS = [
    ["nvda",  "NVDA 生態"],
    ["tsmc",  "TSMC 生態"],
    ["asic",  "ASIC 生態"],
    ["robot", "Robot 生態"],
    ["cpo",   "CPO 生態"],
    ["dc",    "Data Center 生態"],
  ];
  const ecoSets = (() => {
    const nb = (anchor) => {
      const s = new Set([anchor]);
      links.forEach((l) => {
        if (l.type !== "supply" && l.type !== "group") return;
        if (l.source === anchor) s.add(l.target);
        if (l.target === anchor) s.add(l.source);
      });
      return s;
    };
    const uni = (...sets) => {
      const out = new Set();
      sets.forEach((s) => (s || []).forEach((x) => out.add(x)));
      return out;
    };
    return {
      nvda:  nb("NVDA"),
      tsmc:  nb("2330"),
      asic:  uni(THEMES["ASIC生態系"], ["2330"]),
      robot: uni(THEMES["機器人供應鏈"], nb("ROBOT")),
      cpo:   uni(THEMES["CPO矽光子"]),
      dc:    uni(nb("CSP"), THEMES["液冷散熱"], THEMES["電力基礎設施"],
                 THEMES["AI網通"], THEMES["企業級SSD儲存"]),
    };
  })();
  const ecoOf = (id) => ECO_DEFS.filter(([k]) => ecoSets[k].has(id)).map(([k]) => k);

  // 供應鏈鄰接表(上游/下游),供全鏈追蹤遍歷
  let upAdj = null;
  let downAdj = null;
  function buildAdj() {
    upAdj = {};
    downAdj = {};
    simLinks.forEach((l) => {
      if (l.type !== "supply") return;
      (downAdj[l.source.id] ||= []).push(l.target.id);
      (upAdj[l.target.id] ||= []).push(l.source.id);
    });
  }
  function walk(start, adj) {
    const out = new Set();
    const stack = [start];
    while (stack.length) {
      const x = stack.pop();
      for (const y of adj[x] || []) {
        if (!out.has(y)) {
          out.add(y);
          stack.push(y);
        }
      }
    }
    return out;
  }

  const nodeVisible = (n) => {
    const bySector = state.sectors.size === 0 || state.sectors.has(n.sector);
    const byTag = state.tags.size === 0 || (n.tags || []).some((t) => state.tags.has(t));
    const byTheme = state.themes.size === 0 ||
      [...state.themes].some((t) => themesOf[n.id]?.has(t));
    const byEco = state.eco.size === 0 ||
      [...state.eco].some((k) => ecoSets[k]?.has(n.id));
    return bySector && byTag && byTheme && byEco;
  };
  const linkVisible = (l) => state.edges.has(l.type) && nodeVisible(l.source) && nodeVisible(l.target);

  function applyFilters() {
    const sel = state.selected;
    const neighbors = new Set();
    let chainUp = null;
    let chainDown = null;

    if (sel) {
      neighbors.add(sel);
      if (state.chain) {
        // 全鏈追蹤:沿供應線遞迴收集所有上游與下游
        if (!upAdj) buildAdj();
        chainUp = walk(sel, upAdj);
        chainDown = walk(sel, downAdj);
        chainUp.forEach((id) => neighbors.add(id));
        chainDown.forEach((id) => neighbors.add(id));
      } else {
        simLinks.forEach((l) => {
          if (!state.edges.has(l.type)) return;
          if (l.source.id === sel) neighbors.add(l.target.id);
          if (l.target.id === sel) neighbors.add(l.source.id);
        });
      }
    }

    // 一條供應線是否在選取個股的鏈路上(兩端同在上游側或同在下游側)
    const onChain = (l) => {
      if (l.type !== "supply") return false;
      const s = l.source.id;
      const t = l.target.id;
      const upSide = (chainUp.has(s) || s === sel) && (chainUp.has(t) || t === sel);
      const downSide = (chainDown.has(s) || s === sel) && (chainDown.has(t) || t === sel);
      return upSide || downSide;
    };

    nodeSel
      .classed("faded", (d) => !nodeVisible(d) || (sel && !neighbors.has(d.id)))
      .classed("sel", (d) => d.id === sel);
    linkG
      .classed("faded", (d) =>
        !linkVisible(d) ||
        (sel && (state.chain ? !onChain(d) : d.source.id !== sel && d.target.id !== sel))
      )
      .classed("hl", (d) =>
        sel && linkVisible(d) && (state.chain ? onChain(d) : d.source.id === sel || d.target.id === sel)
      );
  }

  document.getElementById("chain-mode").onchange = (ev) => {
    state.chain = ev.target.checked;
    applyFilters();
  };

  // ---------- 產業圖例 ----------
  const legendBox = document.getElementById("sector-legend");
  sectors.forEach((s) => {
    const count = nodes.filter((n) => n.sector === s.id).length;
    const div = document.createElement("div");
    div.className = "legend-item";
    div.innerHTML = `<span class="dot" style="background:var(--s-${s.id})"></span>${s.name}<span class="n">${count}</span>`;
    div.onclick = () => {
      if (state.sectors.has(s.id)) state.sectors.delete(s.id);
      else state.sectors.add(s.id);
      [...legendBox.children].forEach((el, i) => {
        el.classList.toggle("off", state.sectors.size > 0 && !state.sectors.has(sectors[i].id));
      });
      applyFilters();
    };
    legendBox.appendChild(div);
  });

  // ---------- 題材標籤 ----------
  const TAG_ORDER = ["AI", "伺服器", "蘋果鏈", "手機", "網通"];
  const chipBox = document.getElementById("tag-chips");
  TAG_ORDER.forEach((t) => {
    const el = document.createElement("span");
    el.className = "chip";
    el.textContent = t;
    el.onclick = () => {
      if (state.tags.has(t)) state.tags.delete(t);
      else state.tags.add(t);
      el.classList.toggle("on", state.tags.has(t));
      applyFilters();
    };
    chipBox.appendChild(el);
  });

  // ---------- AI 供應鏈主題(含成熟度星級)----------
  const THEME_STARS = window.MAP_THEME_STARS || {};
  const themeBox = document.getElementById("theme-chips");
  if (themeBox) {
    Object.keys(THEMES).forEach((t) => {
      const el = document.createElement("span");
      el.className = "chip theme";
      el.textContent = THEME_STARS[t] ? `${t} ${THEME_STARS[t]}` : t;
      el.title = "成熟度:★★★★★核心/★★★★重要/★★★成長/★★觀察/★概念";
      el.onclick = () => {
        if (state.themes.has(t)) state.themes.delete(t);
        else state.themes.add(t);
        el.classList.toggle("on", state.themes.has(t));
        applyFilters();
      };
      themeBox.appendChild(el);
    });
  }

  // ---------- 關係線開關 ----------
  document.querySelectorAll("#edge-toggles input[data-type]").forEach((cb) => {
    cb.onchange = () => {
      // 「集團」開關同時控制單向持股(group)與互相持股(cross)
      const types = cb.dataset.type === "group" ? ["group", "cross"] : [cb.dataset.type];
      types.forEach((t) => (cb.checked ? state.edges.add(t) : state.edges.delete(t)));
      applyFilters();
    };
  });

  // ---------- 搜尋 ----------
  const search = document.getElementById("search");
  const datalist = document.getElementById("stock-list");
  nodes.forEach((n) => {
    const opt = document.createElement("option");
    opt.value = `${n.id} ${n.name}`;
    datalist.appendChild(opt);
  });
  search.addEventListener("change", () => {
    const q = search.value.trim().toLowerCase();
    if (!q) return;
    const hit =
      nodes.find((n) => `${n.id} ${n.name}`.toLowerCase() === q) ||
      nodes.find((n) => n.id.toLowerCase() === q || n.name.toLowerCase() === q) ||
      nodes.find((n) => n.id.toLowerCase().startsWith(q) || n.name.toLowerCase().includes(q)) ||
      // 也支援產品關鍵字(如「水冷」「載板」「BMC」)
      nodes.find((n) => (n.products || []).some((p) => p.name.toLowerCase().includes(q)));
    if (hit) {
      select(hit.id);
      centerOn(hit);
      search.blur();
    }
  });

  function centerOn(n) {
    const k = 1.4;
    svg.transition().duration(500)
      .call(zoom.transform, d3.zoomIdentity.translate(width / 2 - k * n.x, height / 2 - k * n.y).scale(k));
  }

  // ---------- 報價 / 法說會 / 研究文件 ----------
  let quotes = {};
  let quoteDate = "";
  let confs = {};         // 法說會:交易所開放資料(伺服器代理)
  let docs = {};          // 研究文件:docs/<股號>/ 資料夾自動索引
  let transcripts = {};   // AlphaMemo 逐字稿索引:scripts/sync-alphamemo.mjs 產生
  let fundamentals = {};  // 基本面:EPS/本益比/殖利率(伺服器代理交易所開放資料)
  let rumors = {};        // 市場傳聞:X KOL 貼文索引(scripts/sync-rumors.mjs 產生)
  const quoteStatus = document.getElementById("quote-status");

  // 外部字串(API 資料、檔名)一律跳脫後才放進 innerHTML
  const esc = (s) =>
    String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  const rerenderPanel = () => {
    if (state.selected) renderPanel(nodeById.get(state.selected));
  };
  fetch("/api/conferences")
    .then((r) => (r.ok ? r.json() : Promise.reject(new Error(String(r.status)))))
    .then((d) => { confs = d.conferences || {}; rerenderPanel(); })
    .catch(() => {});
  fetch("/api/docs")
    .then((r) => (r.ok ? r.json() : Promise.reject(new Error(String(r.status)))))
    .then((d) => { docs = d.docs || {}; rerenderPanel(); })
    .catch(() => {});
  fetch("/transcripts.json")
    .then((r) => (r.ok ? r.json() : Promise.reject(new Error(String(r.status)))))
    .then((d) => { transcripts = d.transcripts || {}; rerenderPanel(); })
    .catch(() => {});

  fetch("/rumors.json")
    .then((r) => (r.ok ? r.json() : Promise.reject(new Error(String(r.status)))))
    .then((d) => { rumors = d.rumors || {}; rerenderPanel(); })
    .catch(() => {});

  fetch("/api/quotes")
    .then((r) => (r.ok ? r.json() : Promise.reject(new Error(String(r.status)))))
    .then((data) => {
      quotes = data.quotes || {};
      quoteDate = data.date || "";
      const got = Object.keys(quotes).length;
      quoteStatus.textContent = got ? `收盤報價:${quoteDate}(台股慣例 紅漲綠跌)` : "尚無報價資料";
      applyQuoteRings();
      if (state.selected) renderPanel(nodeById.get(state.selected));
    })
    .catch(() => {
      quoteStatus.textContent = "報價未載入(離線/靜態模式,地圖功能不受影響)";
    });

  // 節點外圈光環:紅漲綠跌,漲跌幅越大越不透明(±5% 封頂)
  function applyQuoteRings() {
    nodeSel
      .select(".qring")
      .style("display", (d) => {
        const q = quotes[d.id];
        return q && q.close != null && q.change ? null : "none";
      })
      .style("stroke", (d) => ((quotes[d.id]?.change || 0) > 0 ? "var(--quote-up)" : "var(--quote-down)"))
      .style("opacity", (d) => {
        const q = quotes[d.id];
        if (!q?.close) return 0;
        const base = q.close - (q.change || 0);
        const pct = base ? Math.abs((q.change / base) * 100) : 0;
        return Math.min(1, 0.3 + (pct / 5) * 0.7);
      });
  }

  const fmtQuote = (id) => {
    const q = quotes[id];
    if (!q || q.close == null) return null;
    const chg = q.change ?? 0;
    const cls = chg > 0 ? "up" : chg < 0 ? "down" : "";
    const sign = chg > 0 ? "▲" : chg < 0 ? "▼" : "—";
    const pct = q.close - chg !== 0 ? ((chg / (q.close - chg)) * 100).toFixed(2) : "0.00";
    return { close: q.close, cls, text: `${sign} ${Math.abs(chg).toFixed(2)}(${pct}%)` };
  };

  // ---------- 浮動提示 ----------
  function moveTip(ev) {
    const pad = 14;
    let x = ev.clientX + pad;
    let y = ev.clientY + pad;
    if (x + tooltip.offsetWidth > window.innerWidth - 8) x = ev.clientX - tooltip.offsetWidth - pad;
    if (y + tooltip.offsetHeight > window.innerHeight - 8) y = ev.clientY - tooltip.offsetHeight - pad;
    tooltip.style.left = x + "px";
    tooltip.style.top = y + "px";
  }
  function showNodeTip(ev, d) {
    const q = fmtQuote(d.id);
    tooltip.innerHTML = `
      <div class="t-name">${d.name} <span class="t-sub">${d.market === "foreign" ? "" : d.id}</span></div>
      <div class="t-sub">${sectorById.get(d.sector).name}${d.tags?.length ? " · " + d.tags.join("、") : ""}</div>
      ${d.products?.length ? `<div>${d.products.slice(0, 3).map((p) => p.name).join("、")}${d.products.length > 3 ? "…" : ""}</div>` : ""}
      ${q ? `<div>收盤 ${q.close} <span style="color:var(--quote-${q.cls || "up"})">${q.text}</span></div>` : ""}
      <div class="t-sub">點擊看詳細關係</div>`;
    tooltip.style.display = "block";
    moveTip(ev);
  }
  function showLinkTip(ev, d) {
    const arrow = d.type === "supply" ? " → " : d.type === "cross" ? " ⇄ " : " ↔ ";
    tooltip.innerHTML = `
      <div class="t-name">${d.source.name}${arrow}${d.target.name}</div>
      <div>${d.label || ""}</div>
      ${d.pct ? `<div class="t-sub">約佔${d.source.name}營收 ${d.pct}%(約略值)</div>` : ""}`;
    tooltip.style.display = "block";
    moveTip(ev);
  }
  function hideTip() {
    tooltip.style.display = "none";
  }

  // ---------- 個股面板 ----------
  const panel = document.getElementById("panel");

  function select(id) {
    // 選到被摺疊族群裡的個股時,先自動展開該族群
    if (id) {
      const n = nodeById.get(id);
      if (n && mode === "chain" && collapsed.has(subKey(n))) {
        toggleSub(n.sector, n.sub);
      }
    }
    state.selected = id;
    applyFilters();
    if (!id) {
      panel.classList.remove("open");
      panel.innerHTML = "";
      return;
    }
    renderPanel(nodeById.get(id));
  }

  function renderPanel(n) {
    const rel = { down: [], up: [], group: [], cross: [], rival: [] };
    simLinks.forEach((l) => {
      if (l.source.id === n.id) {
        // down 的 pct = 佔本公司營收;up 的 pct = 佔對方(供應商)營收
        if (l.type === "supply") rel.down.push({ other: l.target, label: l.label, pct: l.pct, side: "self" });
        else rel[l.type].push({ other: l.target, label: l.label });
      } else if (l.target.id === n.id) {
        if (l.type === "supply") rel.up.push({ other: l.source, label: l.label, pct: l.pct, side: "other" });
        else rel[l.type].push({ other: l.source, label: l.label });
      }
    });
    const q = fmtQuote(n.id);
    const relBlock = (title, items, arrow) =>
      items.length
        ? `<h3>${title}</h3>` +
          items
            .map(
              (it) =>
                `<button class="rel-item" data-id="${it.other.id}">
                   <span class="who">${arrow === "←" ? "← " : arrow === "→" ? "→ " : ""}${it.other.name}${it.other.market === "foreign" ? "" : ` <span style="color:var(--text-muted);font-weight:400">${it.other.id}</span>`}</span>
                   <span class="what">${it.label || ""}${it.pct ? `・約佔${it.side === "self" ? "營收" : "其營收"} ${it.pct}%` : ""}</span>
                 </button>`
            )
            .join("")
        : "";

    // 法說會(僅台股;資料來自交易所開放資料)
    const confItems = (confs[n.id] || []).slice(0, 3);
    const confBlock = confItems.length
      ? `<h3>法說會</h3>` +
        confItems
          .map((c) => {
            const head = `<span class="who">${esc(c.date)}</span><span class="what">${esc(c.msg || c.place || "")}</span>`;
            return c.url && /^https?:/i.test(c.url)
              ? `<a class="rel-item" href="${esc(c.url)}" target="_blank" rel="noopener">${head}</a>`
              : `<div class="rel-item static">${head}</div>`;
          })
          .join("")
      : "";

    // 主要產品線:有佔比的畫長條(由大到小),沒有的以標籤呈現
    const withShare = (n.products || []).filter((p) => p.share != null).sort((a, b) => b.share - a.share);
    const noShare = (n.products || []).filter((p) => p.share == null);
    const prodBlock = (n.products || []).length
      ? `<h3>主要產品${withShare.length ? "・約略營收佔比" : ""}</h3>` +
        withShare
          .map(
            (p) =>
              `<div class="prod-row">
                 <div class="prod-bar" style="width:${Math.min(100, p.share)}%;background:var(--s-${n.sector})"></div>
                 <span class="prod-name">${esc(p.name)}</span><span class="prod-share">${p.share}%</span>
               </div>`
          )
          .join("") +
        (noShare.length ? `<div class="prod-chips">${noShare.map((p) => `<span class="prod">${esc(p.name)}</span>`).join("")}</div>` : "") +
        (withShare.length ? `<div class="doc-hint" style="margin-top:4px">佔比為公開資訊之約略整理,未必加總 100%。</div>` : "")
      : "";

    // 基本面:EPS / 本益比 / 殖利率(交易所開放資料)
    const f = fundamentals[n.id];
    const fundBlock =
      f && (f.eps != null || f.per != null)
        ? `<div class="fund">
             ${f.eps != null ? `<span>EPS ${f.eps} 元${f.period ? `<i>(${esc(f.period)} 累計)</i>` : ""}</span>` : ""}
             ${f.per != null ? `<span>本益比 ${f.per}</span>` : ""}
             ${f.dyield != null ? `<span>殖利率 ${f.dyield}%</span>` : ""}
             ${f.pbr != null ? `<span>淨值比 ${f.pbr}</span>` : ""}
           </div>`
        : "";

    // 逐字稿來源:AlphaMemo 免費逐字稿(固定入口 + 個股站內搜尋)
    const transcriptLinks =
      n.market === "foreign"
        ? ""
        : `<div class="ext-links" style="margin-bottom:8px">
             <a href="https://www.alphamemo.ai/free-transcripts" target="_blank" rel="noopener">AlphaMemo 逐字稿庫</a>
             <a href="https://www.google.com/search?q=${encodeURIComponent(`site:alphamemo.ai ${n.name} 法說會`)}" target="_blank" rel="noopener">找 ${esc(n.name)} 的逐字稿</a>
           </div>`;

    // 研究文件 = AlphaMemo 逐字稿索引 + docs/<股號>/ 內的自有檔案
    const tsItems = (transcripts[n.id] || []).map((t) => ({ ...t, type: "逐字稿", external: true }));
    const docItems = [...tsItems, ...(docs[n.id] || [])];
    const docBlock =
      n.market === "foreign" && !docItems.length
        ? ""
        : `<h3>研究文件${docItems.length ? `(${docItems.length})` : ""}</h3>` +
          transcriptLinks +
          (docItems.length
            ? docItems
                .map(
                  (d) =>
                    `<a class="rel-item" href="${esc(d.url)}" target="_blank" rel="noopener">
                       <span class="who"><span class="doc-type">${esc(d.type)}</span>${esc(d.title)}${d.external ? " ↗" : ""}</span>
                       ${d.date ? `<span class="what">${esc(d.date)}</span>` : ""}
                     </a>`
                )
                .join("")
            : `<div class="doc-hint">將逐字稿或券商報告放入 <code>docs/${esc(n.id)}/</code><br>檔名:<code>日期_類型_標題.pdf</code>,重新整理即會列出。</div>`);

    // 市場聲量:PTT 股票板 + X KOL 公開貼文(未經證實,僅供參考)
    const rumorItems = (rumors[n.id] || []).slice(0, 6);
    const rumorBlock = rumorItems.length
      ? `<h3>市場聲量・未經證實(${rumorItems.length})</h3>` +
        rumorItems
          .map(
            (it) =>
              `<a class="rel-item rumor" href="${esc(it.url)}" target="_blank" rel="noopener">
                 <span class="who"><span class="doc-type">${esc(it.source || "PTT")}</span>${esc(it.author || it.handle || "")}
                   <span style="color:var(--text-muted);font-weight:400">${esc(it.date)}${it.heat ? ` · 推 ${esc(it.heat)}` : ""}</span></span>
                 <span class="what">${esc(it.text)}</span>
               </a>`
          )
          .join("") +
        `<div class="doc-hint" style="margin-top:4px">來源為公開討論區/貼文,內容未經證實,非投資建議。</div>`
      : "";

    // 外部資源(公開網站的個股頁)
    const extBlock =
      n.market === "foreign"
        ? ""
        : `<h3>外部資源</h3><div class="ext-links">
             <a href="https://mops.twse.com.tw/mops/#/web/t146sb05?companyId=${n.id}" target="_blank" rel="noopener">MOPS</a>
             <a href="https://statementdog.com/analysis/${n.id}" target="_blank" rel="noopener">財報狗</a>
             <a href="https://goodinfo.tw/tw/StockDetail.asp?STOCK_ID=${n.id}" target="_blank" rel="noopener">Goodinfo</a>
             <a href="https://tw.stock.yahoo.com/quote/${n.id}.TW" target="_blank" rel="noopener">Yahoo</a>
           </div>`;

    const stage = STAGES[stageOfSector.get(n.sector)];
    const x = n.extra;
    const memberEcos = ecoOf(n.id);
    const ecoCard = x
      ? `<div class="eco-card">
           <div class="eco-line"><span class="k">核心技術</span>${esc(x.t)}</div>
           <div class="eco-line"><span class="k">市場地位</span>${esc(x.r)}</div>
           ${x.a ? `<div class="eco-line"><span class="k">替代供應商</span>${esc(x.a)}</div>` : ""}
           <div class="eco-meta">
             <span class="meta expo-${x.e === "高" ? "hi" : x.e === "中" ? "mid" : "lo"}">AI 曝險 ${x.e}</span>
             <span class="meta ${x.c ? "yes" : "no"}">AI CapEx ${x.c ? "受惠 ✓" : "非直接"}</span>
           </div>
         </div>`
      : "";
    const ecoBadges = `<div class="eco-membership">${ECO_DEFS.map(([k, label]) => {
      const isMember = memberEcos.includes(k);
      const on = state.eco.has(k);
      return `<button class="eco-badge${isMember ? " member" : ""}${on ? " on" : ""}" data-eco="${k}"
        title="${isMember ? "屬於此生態系,點擊篩選整個生態" : "不屬於此生態系,點擊仍可篩選"}">${label} ${isMember ? "✓" : "—"}</button>`;
    }).join("")}</div>`;
    panel.innerHTML = `
      <button class="panel-close" title="關閉">✕</button>
      <h2>${n.name}</h2>
      <div class="ticker">${n.market === "foreign" ? "海外公司" : `${n.id} · ${n.market === "twse" ? "上市" : "上櫃"}`}</div>
      <div class="sector-chip"><span class="dot" style="background:var(--s-${n.sector})"></span>${sectorById.get(n.sector).name} · ${stage.label}</div>
      ${themesOf[n.id] ? `<div class="theme-tags">${[...themesOf[n.id]].map((t) => `<span>${t}</span>`).join("")}</div>` : ""}
      ${
        q
          ? `<div class="quote"><span class="price">${q.close}</span><span class="chg ${q.cls}">${q.text}</span><div class="asof">${quoteDate} 收盤</div></div>`
          : ""
      }
      <p class="desc">${n.desc}</p>
      ${ecoCard}
      ${ecoBadges}
      ${fundBlock}
      ${prodBlock}
      ${confBlock}
      ${docBlock}
      ${relBlock("上游供應商", rel.up, "←")}
      ${relBlock("下游客戶", rel.down, "→")}
      ${relBlock("集團/持股", rel.group, "")}
      ${relBlock("互相持股", rel.cross, "")}
      ${relBlock("競爭對手", rel.rival, "")}
      ${rumorBlock}
      ${extBlock}
    `;
    panel.classList.add("open");
    panel.querySelector(".panel-close").onclick = () => select(null);
    panel.querySelectorAll(".rel-item").forEach((btn) => {
      btn.onclick = () => {
        const target = nodeById.get(btn.dataset.id);
        select(target.id);
        centerOn(target);
      };
    });
    panel.querySelectorAll(".eco-badge").forEach((btn) => {
      btn.onclick = () => {
        const k = btn.dataset.eco;
        if (state.eco.has(k)) state.eco.delete(k);
        else state.eco.add(k);
        btn.classList.toggle("on", state.eco.has(k));
        applyFilters();
      };
    });
  }

  applyFilters();
})();
</script>
