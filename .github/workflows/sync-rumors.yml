# 同步市場聲量到 public/rumors.json
# 來源:PTT 股票板(免費)+ X KOL(選配,需 repo secret X_BEARER_TOKEN)。
name: Sync market chatter

on:
  schedule:
    - cron: "0 1,13 * * *"   # 每天 09:00 / 21:00 台北時間
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/sync-rumors.mjs"   # 解析器更新時立即重新同步

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Sync chatter
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: node scripts/sync-rumors.mjs --dump /tmp/ptt-index.html

      # 解析失敗時上傳抓到的頁面,方便診斷版面
      - name: Upload fetched page for diagnosis
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ptt-index
          path: /tmp/ptt-index.html
          retention-days: 3

      - name: Commit if changed
        run: |
          if git diff --quiet public/rumors.json 2>/dev/null; then
            echo "索引無變化,略過提交"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/rumors.json
          git commit -m "chore: 同步市場聲量索引(PTT/X)"
          git push
